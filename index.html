function freshLocal(){return{mode:null,tab:"home",roomId:"",playerId:"p-"+Math.random().toString(36).slice(2,9),masterName:"Мастер",player:null,popup:null,lastEventId:null,journalFilter:"all"}}function loadLocal(){try{return JSON.parse(localStorage.getItem(LS))||freshLocal()}catch{return freshLocal()}}function saveLocal(){localStorage.setItem(LS,JSON.stringify(state))}function dbRef(p){return ref(db,p)}function roomPath(extra=""){return"rooms/"+state.roomId+(extra?"/"+extra:"")}function fbSet(p,v){return set(dbRef(p),v)}function fbUpdate(p,v){return update(dbRef(p),v)}function fbPush(p,v){return push(dbRef(p),v)}function fbRemove(p){return remove(dbRef(p))}function val(id){return document.getElementById(id)?.value||""}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}function fmt(n){n=Number(n||0);return n>=0?"+"+n:String(n)}function mod(score){return Math.floor((Number(score)-10)/2)}const XP_LEVELS=[0,0,300,900,2700,6500,14000,23000,34000,48000,64000,85000,100000,120000,140000,165000,195000,225000,265000,305000,355000];

function parseDiceFormula(str){const m=String(str||"").match(/(\d*)d(\d+)\s*([+-]\s*\d+)?/i);if(!m)return{count:1,sides:20,bonus:0};return{count:Number(m[1]||1),sides:Number(m[2]),bonus:m[3]?Number(m[3].replace(/\s+/g,"")):0}}

function splitActionText(txt){const parts=String(txt).split(":");return {title:parts[0]||txt,body:parts.slice(1).join(":").trim()||txt}}
function renderAbilityCards(list,type="active"){return `<div class="ability-cards">${(list||[]).map(x=>{const a=splitActionText(x);return `<div class="action-card"><span class="chip ${type==="active"?"red":"yellow"}">${type==="active"?"активное":"пассивное"}</span><b>${esc(a.title)}</b><p>${esc(a.body)}</p></div>`}).join("")}</div>`}
function renderClassLevelRoadmap(p){const cls=CLASSES[p.classKey]||CLASSES.rogue;const base=cls.features||[];let rows=[];for(let lvl=1;lvl<=20;lvl++){let txt=lvl===1?base.join(", "):lvl%4===0?"Улучшение характеристик / черта":lvl===5?"Важный скачок силы: атака, заклинания или приёмы":lvl===11?"Усиление класса":lvl===17?"Сильные высокоуровневые умения":"Новые умения класса по правилам";rows.push(`<div class="box ${lvl<=p.level?"green":"blue"}"><b>${lvl} уровень</b><p>${esc(txt)}</p></div>`)}return `<div class="card" style="margin-top:14px"><h3>Что будет по уровням</h3><p class="sub">Когда мастер начисляет опыт и уровень растёт, бонус мастерства, ХП и подсказки пересчитываются.</p><div class="grid two">${rows.join("")}</div></div>`}
function renderMasterXpPanel(){const players=Object.values(roomData?.players||{}),monsters=Object.values(roomData?.monsters||{});const dead=monsters.filter(m=>m.status==="dead"||Number(m.hp||0)<=0);const total=dead.reduce((a,m)=>a+monsterXp(m),0);const each=players.length?Math.max(0,Math.round(total/players.length)):0;return `<div class="card" style="margin-top:14px"><h3>Конец боя: опыт</h3><p class="sub">Побеждённые враги: ${dead.length}. Рекомендованный опыт всего: ${total}. Можно выдать поровну или руками каждому.</p><div class="grid two">${players.map(p=>`<div class="box green"><b>${esc(p.name)}</b><p>Сейчас: ${p.xp||0} опыта · ${p.level} уровень · до следующего: ${Math.max(0,nextXpFor(p.level)-(p.xp||0))}</p><div class="xp-mini"><input id="xp_end_${p.id}" type="number" value="${each}"><button class="btn main" onclick="addXpPlayer('${p.id}',Number(document.getElementById('xp_end_${p.id}').value||0))">Выдать</button></div></div>`).join("")}</div><button class="btn yellow full" style="margin-top:10px" onclick="clearCombat()">Закончить и очистить бой</button></div>`}
function addMasterNote(){const title=val("noteTitle").trim()||"Заметка",text=val("noteText").trim();if(!text)return;fbPush(roomPath("masterNotes"),{title,text,createdAt:Date.now()})}
function removeMasterNote(id){fbRemove(roomPath("masterNotes/"+id))}
function renderMasterPlayers(){const players=Object.values(roomData?.players||{});return`<div class="hero"><h2>Игроки</h2><p>Мастер видит игроков и получает подсказки: какие проверки просить и какие кубики кидать. Сцену рассказываешь голосом.</p></div>${renderStatusCheatsheet()}${skillRequestCards()}<div class="card" style="margin-top:14px"><h3>Попросить бросок вручную</h3><p class="sub">Любой персонаж может пробовать любое действие: плут может выбивать дверь, варвар может убеждать.</p><div class="grid three"><div class="field"><label>Проверка</label><select id="rollSkill">${Object.entries(SKILLS).map(([k,v])=>`<option value="${k}">${v[0]}</option>`).join("")}<option value="initiative">Инициатива</option><option value="saveDex">Спасбросок Ловкости</option><option value="saveCon">Спасбросок Телосложения</option><option value="saveWis">Спасбросок Мудрости</option></select></div><div class="field"><label>Текст игрокам</label><input id="rollText" placeholder="Киньте Восприятие, чтобы заметить ловушку"></div><div class="field"><label>&nbsp;</label><button class="btn main full" onclick="requestRoll()">Попросить бросок</button></div></div><button class="btn" onclick="clearRollRequest()">Убрать запрос броска</button></div><div class="grid two" style="margin-top:14px">${players.length?players.map(renderMasterPlayerCard).join(""):`<div class="empty">Игроков пока нет.</div>`}</div>`}
function renderMasterPlayerCard(p){const st=STATUS[p.status||"normal"]||STATUS.normal,hpPct=Math.max(0,Math.min(100,(p.hp||0)/(p.maxHp||1)*100)),acts=CLASS_ACTIONS[p.classKey]||CLASS_ACTIONS.rogue,race=RACES[p.raceKey]||RACES.human;return`<div class="card"><div class="card-head"><div><h3>${esc(p.name)} <button class="help" onclick="toggleHint('hAb_${p.id}')" type="button">?</button></h3><p class="sub">${esc(p.raceName||"")} · ${esc(p.className||"")} · ${p.level} ур. · мастерство ${fmt(prof(p.level))}</p></div><span class="chip ${st[2]}">${st[0]}</span></div><div id="hAb_${p.id}" class="hint box blue"><b>Активные способности класса</b>${acts.combat.map(x=>`<p>• ${esc(x)}</p>`).join("")}<b>Пассивные способности</b>${acts.passive.map(x=>`<p>• ${esc(x)}</p>`).join("")}<b>Особенности расы</b>${race.features.map(x=>`<p>• ${esc(x)}</p>`).join("")}</div><div class="stats"><div class="stat"><span>ХП</span><b>${p.hp}/${p.maxHp}</b></div><div class="stat"><span>КД</span><b>${p.ac}</b></div><div class="stat"><span>Пасс.</span><b>${p.passive}</b></div><div class="stat"><span>Иниц.</span><b>${fmt(p.initiative)}</b></div><div class="stat"><span>Опыт</span><b>${p.xp||0}</b></div><div class="stat"><span>Врем.</span><b>${p.tempHp||0}</b></div></div><div class="hpbar"><div class="hpfill" style="width:${hpPct}%"></div></div><div class="box blue" style="margin-top:12px"><b>Атака игрока</b><p>${esc(p.attackText||p.attack)}. Урон: ${esc(p.damage)}.${p.bonus?` Бонус класса: ${esc(p.bonus)}.`:""}</p></div><div class="btn-row" style="margin-top:14px"><button class="btn" onclick="damagePlayer('${p.id}',1)">-1</button><button class="btn" onclick="damagePlayer('${p.id}',5)">-5</button><button class="btn" onclick="damagePlayer('${p.id}',10)">-10</button><button class="btn green" onclick="healPlayer('${p.id}',5)">+5 ХП</button></div><div class="grid two" style="margin-top:10px"><div class="field"><label>Точный урон/лечение</label><input id="dmgCustom_${p.id}" type="number" placeholder="например 7 function renderMasterCombat(){const monsters=roomData?.monsters||{};return`<div class="hero"><h2>Бой</h2><p>Всё по монстрам теперь внутри боя: добавление, враги на поле, урон и подробности.</p></div>${renderMonsterLibraryCompact()}<div class="card" style="margin-top:14px"><div class="card-head"><div><h3>Враги на поле</h3><p class="sub">Компактные строки. Нажми «подробно», чтобы раскрыть поведение и лут.</p></div><button class="btn yellow" onclick="clearCombat()">Очистить бой</button></div>${Object.entries(monsters).length?`<div class="monster-list">${Object.entries(monsters).map(([id,m])=>renderMonsterCard(id,m)).join("")}</div>`:`<div class="empty">Монстров пока нет.</div>`}</div>${renderMasterXpPanel()}`}
function renderMonsterLibraryCompact(){const groups={};Object.entries(MONSTERS).forEach(([k,m])=>{(groups[m.cat]||(groups[m.cat]=[])).push([k,m])});return`<div class="card"><h3>Добавить монстра</h3><p class="sub">Это гармошки. Нажми на категорию, потом на карточку монстра.</p><div class="stack" style="margin-top:12px">${Object.entries(groups).map(([cat,list])=>`<details class="fold"><summary><span>${esc(cat)}</span><span class="chip white">${list.length} вариантов</span></summary><div class="fold-body"><div class="monster-add-grid">${list.map(([k,m])=>`<div class="monster-add-card"><div><b>${esc(m.name)}</b><div class="monster-mini"><span>ХП ${m.hp}</span><span>КД ${m.ac}</span><span>CR ${esc(m.cr)}</span></div></div><details class="fold enemy-details"><summary><span>Инфо</span></summary><div class="fold-body"><p class="sub">${esc(m.type)} · атака ${esc(m.attack)} · урон ${esc(m.damage)}</p><p>${esc(m.behavior||"")}</p><p class="small">Лут: ${esc(m.loot||"")}</p></div></details><button class="btn main full" onclick="addMonster('${k}')">+ В бой</button></div>`).join("")}</div></div></details>`).join("")}</div></div>`}
function renderMonsterCard(id,m){const hpPct=Math.max(0,Math.min(100,(m.hp||0)/(m.maxHp||1)*100)),dead=m.status==="dead"||Number(m.hp||0)<=0;return`<div class="enemy-row ${dead?"dead":""}"><div><h4>${esc(m.name)} ${dead?"— повержен":""}</h4><div class="monster-mini"><span>ХП ${m.hp}/${m.maxHp}</span><span>КД ${m.ac}</span><span>атака ${esc(m.attack)}</span><span>урон ${esc(m.damage)}</span></div><div class="hpbar"><div class="hpfill" style="width:${hpPct}%"></div></div><details class="fold enemy-details"><summary><span>Подробно</span></summary><div class="fold-body"><p class="sub">${esc(m.type)} · ${esc(m.cat)} · CR ${esc(m.cr)} · скорость ${esc(m.speed)}</p><div class="grid two" style="margin-top:10px"><div class="box yellow"><b>Поведение</b><p>${esc(m.behavior||"")}</p></div><div class="box green"><b>Лут</b><p>${esc(m.loot||"")}</p></div></div></div></details></div><div class="btn-row"><button class="btn" onclick="damageMonster('${id}',1)">-1</button><button class="btn" onclick="damageMonster('${id}',5)">-5</button><button class="btn" onclick="damageMonster('${id}',10)">-10</button><button class="btn green" onclick="healMonster('${id}',5)">+5</button><button class="btn bad" onclick="removeMonster('${id}')">убрать</button></div></div>`}
function renderLoot(){const players=roomData?.players||{};return`<div class="hero"><h2>Лут</h2><p>Выдай предмет или деньги игроку. Это попадёт в сумку и журнал.</p></div><div class="grid two"><div class="card"><h3>Выдать предмет</h3><div class="field"><label>Игрок</label><select id="lootPlayer">${Object.values(players).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select></div><div class="field"><label>Предмет</label><select id="lootItem">${Object.entries(ITEMS).map(([k,i])=>`<option value="${k}">${i.name} — ${i.effect}</option>`).join("")}</select></div><button class="btn main full" onclick="giveItem()">Выдать</button></div><div class="card"><h3>Выдать деньги</h3><div class="field"><label>Игрок</label><select id="coinPlayer">${Object.values(players).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select></div><div class="grid three"><div class="field"><label>ЗМ</label><input id="giveGp" type="number" value="0"></div><div class="field"><label>СМ</label><input id="giveSp" type="number" value="0"></div><div class="field"><label>ММ</label><input id="giveCp" type="number" value="0"></div></div><button class="btn main full" onclick="giveCoins()">Выдать деньги</button></div></div>`}
function renderNpc(){const npcs=roomData?.npcs||{};return`<div class="hero"><h2>NPC</h2><p>Персонажи мастера: манера, цель, знания, секрет. Готовые шаблоны можно менять под свою историю.</p></div><div class="card"><h3>Готовые шаблоны</h3><div class="btn-row">${Object.entries(NPCS).map(([k,n])=>`<button class="btn" onclick="addNpc('${k}')">+ ${n.name}</button>`).join("")}</div></div><div class="card" style="margin-top:14px"><h3>Свой NPC</h3><div class="grid two"><div class="field"><label>Имя</label><input id="npcName" placeholder="Старуха у моста"></div><div class="field"><label>Группа/место</label><input id="npcGroup" placeholder="Дорога"></div><div class="field"><label>Роль</label><input id="npcRole" placeholder="продаёт травы"></div><div class="field"><label>Манера</label><input id="npcMood" placeholder="ворчливая"></div><div class="field"><label>Что знает</label><input id="npcKnows" placeholder="кто проходил ночью"></div><div class="field"><label>Секрет</label><input id="npcSecret" placeholder="сама была разбойницей"></div></div><button class="btn main full" onclick="addCustomNpc()">Добавить своего NPC</button></div><div class="grid two" style="margin-top:14px">${Object.entries(npcs).length?Object.entries(npcs).map(([id,n])=>`<div class="card"><div class="field"><label>Имя</label><input value="${esc(n.name)}" onchange="updateNpcField('${id}','name',this.value)"></div><div class="field"><label>Группа · роль</label><input value="${esc(n.group)} · ${esc(n.role)}" onchange="const parts=this.value.split('·');updateNpcField('${id}','group',(parts[0]||'').trim());updateNpcField('${id}','role',(parts[1]||'').trim())"></div><div class="box blue"><b>Манера</b><input value="${esc(n.mood)}" onchange="updateNpcField('${id}','mood',this.value)"></div><div class="box green" style="margin-top:10px"><b>Что знает</b><input value="${esc(n.knows)}" onchange="updateNpcField('${id}','knows',this.value)"></div><div class="box purple" style="margin-top:10px"><b>Секрет</b><input value="${esc(n.secret)}" onchange="updateNpcField('${id}','secret',this.value)"></div><button class="btn bad full" style="margin-top:12px" onclick="removeNpc('${id}')">Убрать NPC</button></div>`).join(""):`<div class="empty">NPC пока нет.</div>`}</div>`}
function renderScenes(){const notes=roomData?.masterNotes||{};return`<div class="hero"><h2>Заметки мастера</h2><p>Текст игрокам убрал. Сцену рассказываешь голосом, здесь только заметки мастера: заголовок и текст.</p></div><div class="card"><h3>Новая заметка</h3><div class="field"><label>Заголовок</label><input id="noteTitle" placeholder="Тайна трактира"></div><div class="field"><label>Текст</label><textarea id="noteText" placeholder="Что скрыто, кто врёт, что будет дальше..."></textarea></div><button class="btn main full" onclick="addMasterNote()">Сохранить заметку</button></div><div class="grid two" style="margin-top:14px">${Object.entries(notes).length?Object.entries(notes).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)).map(([id,n])=>`<div class="card"><h3>${esc(n.title)}</h3><p>${esc(n.text)}</p><p class="small">${nowTime(n.createdAt)}</p><button class="btn bad full" style="margin-top:10px" onclick="removeMasterNote('${id}')">Удалить</button></div>`).join(""):`<div class="empty">Заметок пока нет.</div>`}</div>`}
function renderEvents(){const players=roomData?.players||{},filter=state.journalFilter||"all";return`<div class="hero"><h2>Журнал уведомлений</h2><p>Все события с фильтрами: бой, мир, проверки, лут, системные, тайные.</p></div><div class="card"><div class="btn-row">${Object.entries(EVENT_TYPES).map(([k,v])=>`<button class="btn ${filter===k?"main":""}" onclick="setJournalFilter('${k}')">${v[0]}</button>`).join("")}</div></div><div class="card" style="margin-top:14px"><h3>Создать сообщение</h3><div class="grid four"><div class="field"><label>Тип</label><select id="eventKind">${Object.entries(EVENT_TYPES).filter(([k])=>k!=="all").map(([k,v])=>`<option value="${k}">${v[0]}</option>`).join("")}</select></div><div class="field"><label>Кому</label><select id="eventTarget"><option value="all">Всем</option><option value="player">Всем игрокам</option><option value="master">Только мастеру</option>${Object.values(players).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select></div><div class="field"><label>Заголовок</label><input id="eventTitle" placeholder="Ловушка!"></div><div class="field"><label>Текст</label><input id="eventText" placeholder="Вам нанесли 5 урона"></div></div><button class="btn main full" onclick="addManualEvent()">Показать сообщение</button></div><div class="grid two" style="margin-top:14px">${renderEventLog(80,filter,true)}</div>`}
function renderEventCard(id,e,canRemove=false){const color=eventColor(e.kind);return`<div class="box ${color}"><b>${esc(e.title)}</b><p>${esc(e.text)}</p><p class="small">${nowTime(e.createdAt)} · тип: ${EVENT_TYPES[e.kind]?.[0]||e.kind} · кому: ${esc(e.target||"all")}</p>${canRemove?`<button class="btn" style="margin-top:10px" onclick="removeEvent('${id}')">убрать</button>`:""}</div>`}function renderEventLog(limit=12,filter="all",canRemove=false){const events=roomData?.events||{};let list=Object.entries(events).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));if(filter&&filter!=="all")list=list.filter(([id,e])=>e.kind===filter);list=list.slice(0,limit);if(!list.length)return`<div class="empty">Журнал пока пуст.</div>`;return list.map(([id,e])=>renderEventCard(id,e,canRemove)).join("")}function renderReset(){return`<div class="hero"><h2>Сброс</h2><p>Очистка боя, событий или всей комнаты.</p></div><div class="grid two"><div class="card"><h3>Очистить бой</h3><button class="btn yellow full" onclick="clearCombat()">Очистить бой</button></div><div class="card"><h3>Очистить события</h3><button class="btn yellow full" onclick="clearEvents()">Очистить события</button></div><div class="card"><h3>Сбросить комнату</h3><button class="btn bad full" onclick="resetRoom()">Сбросить комнату</button></div><div class="card"><h3>Сбросить устройство</h3><button class="btn bad full" onclick="resetLocal()">Сбросить устройство</button></div></div>`}
function normalizePlayer(p={}){const cls=CLASSES[p.classKey]||CLASSES.rogue,race=RACES[p.raceKey]||RACES.human,bg=BACKGROUNDS[p.bgKey]||BACKGROUNDS.acolyte,align=ALIGNMENTS[p.alignmentKey]||ALIGNMENTS.nn,stats={...defaultStats(cls===CLASSES.rogue?"rogue":(p.classKey||"rogue")),...(p.stats||{})};return{...p,id:p.id||state.playerId,name:p.name||"Игрок",classKey:p.classKey||"rogue",raceKey:p.raceKey||"human",bgKey:p.bgKey||"acolyte",alignmentKey:p.alignmentKey||"nn",className:p.className||cls.name,raceName:p.raceName||race.name,bgName:p.bgName||bg.name,alignment:p.alignment||align[0],level:Number(p.level||1),xp:Number(p.xp||0),stats,skills:p.skills||{},expertise:p.expertise||{},saves:p.saves||cls.saves||[],hp:Number(p.hp??p.maxHp??8),maxHp:Number(p.maxHp??8),tempHp:Number(p.tempHp||0),ac:Number(p.ac||cls.ac||12),passive:Number(p.passive||10+skillBonusRaw("perception",stats,p.skills||{},p.level||1,p.expertise||{})),initiative:Number(p.initiative??mod(stats.dex)),status:p.status||"normal",weaponKey:p.weaponKey||cls.weapon||"rapier",weapon:p.weapon||WEAPONS[p.weaponKey||cls.weapon]?.name||"Оружие",damage:p.damage||damageFormula(stats,p.weaponKey||cls.weapon||"rapier"),attack:p.attack||"d20",attackText:p.attackText||"d20 + бонус атаки",bonus:p.bonus||cls.bonus||"",items:p.items||[],coins:p.coins||{gp:0,sp:0,cp:0},death:p.death||{ok:0,fail:0},notes:p.notes||""}}
function renderPlayer(){const cloud=roomData?.players?.[state.playerId];if(cloud){state.player=normalizePlayer(cloud);saveLocal()}if(!state.player)return renderCreatePlayer();state.player=normalizePlayer(state.player);if(state.tab==="playerWorld")return renderWorld();if(state.tab==="playerSkills")return renderSkills();if(state.tab==="playerCharacter")return renderCharacter();if(state.tab==="playerBag")return renderBag();if(state.tab==="playerSheet")return renderSheet();if(state.tab==="playerEvents")return renderEvents();return renderCombat()}
function renderCreatePlayer(){return`<div class="hero"><h2>Создание персонажа</h2><p>Класс, раса, предыстория, мировоззрение, навыки, оружие, деньги и характеристики. Новичку проще нажать "Случайный герой" и сразу играть.</p></div><div class="card dark"><h3>Быстрый старт</h3><p class="sub">Одна кнопка сама выбирает класс, расу, предысторию, имя, характеристики, навыки и оружие. Дальше можно всё поменять руками, если хочется.</p><button class="btn main full" style="margin-top:10px" onclick="randomHero()">🎲 Случайный герой</button></div><div class="card" style="margin-top:14px"><div class="grid two"><div class="field"><label>Имя <button class="help" onclick="toggleHint('hName')" type="button">?</button></label><input id="cName" placeholder="Мускат"><div id="hName" class="hint box blue"><p>Имя персонажа.</p></div></div><div class="field"><label>Класс <button class="help" onclick="toggleHint('hClass')" type="button">?</button></label><select id="cClass" onchange="fillClassDefaults();renderCreatePlayerRefresh();">${Object.entries(CLASSES).map(([k,c])=>`<option value="${k}">${c.name}</option>`).join("")}</select><div id="hClass" class="hint box blue"><p>Класс — главная роль героя.</p></div></div><div class="field"><label>Раса <button class="help" onclick="toggleHint('hRace')" type="button">?</button></label><select id="cRace" onchange="renderCreatePlayerRefresh();">${Object.entries(RACES).map(([k,r])=>`<option value="${k}">${r.name}</option>`).join("")}</select><div id="hRace" class="hint box green"><p>Раса — происхождение героя.</p></div></div><div class="field"><label>Предыстория <button class="help" onclick="toggleHint('hBg')" type="button">?</button></label><select id="cBg" onchange="applySuggestedSkills();renderCreatePlayerRefresh();">${Object.entries(BACKGROUNDS).map(([k,b])=>`<option value="${k}">${b.name}</option>`).join("")}</select><div id="hBg" class="hint box yellow"><p>Кем герой был до приключений.</p></div></div><div class="field"><label>Мировоззрение <button class="help" onclick="toggleHint('hAlign')" type="button">?</button></label><select id="cAlign">${Object.entries(ALIGNMENTS).map(([k,a])=>`<option value="${k}">${a[0]}</option>`).join("")}</select><div id="hAlign" class="hint box yellow"><p>Как герой принимает решения. Это подсказка, не закон.</p></div></div><div class="field"><label>Уровень</label><select id="cLevel">${Array.from({length:20},(_,i)=>`<option value="${i+1}" ${i+1===3?"selected":""}>${i+1}</option>`).join("")}</select></div><div class="field"><label>Опыт</label><input id="cXp" type="number" value="900"></div><div class="field"><label>КД</label><input id="cAc" type="number" value="14"></div></div><div class="grid two" style="margin-top:14px"><div class="box blue" id="classPreview">${previewClass("rogue")}</div><div class="box green" id="racePreview">${previewRace("human")}</div></div><div class="card dark" style="margin-top:14px"><h3>Характеристики <button class="help" onclick="toggleHint('hStatDice')" type="button">?</button></h3><div id="hStatDice" class="hint box yellow"><p><b>Какие кубики кидать:</b> на каждую характеристику кинь <b>4d6</b> (четыре шестигранника), убери самый маленький результат, сложи оставшиеся три — это одно число характеристики. Повтори 6 раз (Сила, Ловкость, Телосложение, Интеллект, Мудрость, Харизма) и расставь как хочешь. Не хочешь кидать — просто оставь числа по умолчанию, они уже сбалансированы под класс.</p></div><p class="sub">Важнее модификатор: +3, +2, +1, 0, -1. Большие числа 8–16 второстепенные.</p><div class="stats">${Object.entries(AB).map(([k,v])=>`<div class="field"><label>${v[0]} <button class="help" onclick="alert('${v[2].replaceAll("'","")}')" type="button">?</button></label><input id="stat_${k}" type="number" value="${defaultStats("rogue")[k]}"></div>`).join("")}</div></div><div class="card dark" style="margin-top:14px"><h3>Навыки</h3><p class="sub">Отмеченные навыки получают мастерство. На 1–4 уровне мастерство +2.</p><div class="check-grid">${Object.entries(SKILLS).map(([k,s])=>`<label class="check"><input type="checkbox" id="skill_${k}"><span><b>${s[0]}</b><br><small>${AB[s[1]][1]} · ${s[2]}</small></span></label>`).join("")}</div><button class="btn blue full" style="margin-top:12px" onclick="applySuggestedSkills()">Поставить навыки по классу и предыстории</button></div><div class="card dark" style="margin-top:14px"><h3>Экспертиза и спасброски</h3><p class="sub">Экспертиза — персонаж особенно хорош в навыке. Спасброски уже выделены по классу, но можно поменять вручную.</p><div class="check-grid">${Object.entries(SKILLS).map(([k,s])=>`<label class="check"><input type="checkbox" id="expert_${k}"><span><b>${s[0]}</b><br><small>${s[2]}</small></span></label>`).join("")}</div><h3 style="margin-top:14px">Спасброски класса</h3><div class="check-grid">${Object.entries(AB).map(([k,v])=>`<label class="check"><input type="checkbox" id="save_${k}"><span><b>${v[0]}</b><br><small>${v[2]}</small></span></label>`).join("")}</div></div><div class="card dark" style="margin-top:14px"><h3>Оружие</h3><p class="sub">Можно выбрать несколько. Первое выбранное станет основным.</p><div class="check-grid">${Object.entries(WEAPONS).map(([k,w])=>`<label class="check"><input type="checkbox" id="weapon_${k}"><span><b>${w.name}</b><br><small>${w.type} · атака d20 + ${AB[w.ability][0]} + мастерство · урон ${w.damageDie} + ${AB[w.ability][0]}</small></span></label>`).join("")}</div><button class="btn blue full" style="margin-top:12px" onclick="applySuggestedWeapon()">Поставить оружие класса</button></div><div class="card dark" style="margin-top:14px"><h3>Деньги</h3><div class="grid three"><div class="field"><label>Золото</label><input id="coinGp" type="number" value="15"></div><div class="field"><label>Серебро</label><input id="coinSp" type="number" value="0"></div><div class="field"><label>Медь</label><input id="coinCp" type="number" value="0"></div></div></div><div class="box yellow" style="margin-top:14px"><b>Спасброски</b><p>Спасбросок — защита от опасности: ловушка, яд, магия, падение. Класс сам выбирает сильные спасброски.</p></div><button class="btn main full" style="margin-top:14px" onclick="createPlayer()">Создать персонажа</button></div>`}
function renderCreatePlayerRefresh(){setTimeout(()=>{document.getElementById("classPreview").innerHTML=previewClass(val("cClass"));document.getElementById("racePreview").innerHTML=previewRace(val("cRace"))},0)}function previewClass(k){const c=CLASSES[k]||CLASSES.rogue,a=CLASS_ACTIONS[k]||CLASS_ACTIONS.rogue;return`<b>${c.name}</b><p>${c.role}</p><p><b>В бою:</b> ${a.combat[0]}</p><p><b>Спасброски:</b> ${c.saves.map(s=>AB[s][0]).join(", ")}</p><p><b>Кубики, которые нужны этому классу:</b></p>${renderDiceChips(k,c.weapon,c.bonus)}`}function previewRace(k){const r=RACES[k]||RACES.human;return`<b>${r.name}</b><p>${r.bonus}</p><p>${r.tip}</p><div class="chips">${r.features.map(x=>`<span class="chip green">${x}</span>`).join("")}</div>`}
function renderCombat(){const p=normalizePlayer(state.player),acts=CLASS_ACTIONS[p.classKey]||CLASS_ACTIONS.rogue,race=RACES[p.raceKey]||RACES.human,roll=roomData?.rollRequest,secret=roomData?.secrets?.[state.playerId],monsters=roomData?.monsters||{},alive=Object.entries(monsters).filter(([id,m])=>m.status!=="dead"&&Number(m.hp||0)>0),hpPct=Math.max(0,Math.min(100,(p.hp||0)/(p.maxHp||1)*100));return`<div class="hero"><h2>${esc(p.name)}: бой</h2><p>${esc(p.raceName)} · ${esc(p.className)} · ${p.level} уровень · мастерство ${fmt(prof(p.level))}</p></div>${secret?`<div class="box purple" style="margin-bottom:14px"><b>Тайное сообщение</b><p>${esc(secret.text)}</p><button class="btn" style="margin-top:10px" onclick="clearSecret()">Понял</button></div>`:""}${roll?renderRollRequest(roll,p):""}<div class="grid two"><div class="card"><h3>Здоровье</h3><div class="stats"><div class="stat"><span>ХП</span><b>${p.hp}/${p.maxHp}</b></div><div class="stat"><span>КД</span><b>${p.ac}</b></div><div class="stat"><span>Иниц.</span><b>${fmt(p.initiative)}</b><div class="score">d20 ${fmt(p.initiative)}</div></div><div class="stat"><span>Пасс.</span><b>${p.passive}</b></div><div class="stat"><span>Опыт</span><b>${p.xp}</b></div><div class="stat"><span>Врем.</span><b>${p.tempHp||0}</b></div></div><div class="hpbar"><div class="hpfill" style="width:${hpPct}%"></div></div><div class="btn-row" style="margin-top:14px"><button class="btn" onclick="myDamage(1)">-1</button><button class="btn" onclick="myDamage(5)">-5</button><button class="btn" onclick="myDamage(10)">-10</button><button class="btn green" onclick="myHeal(5)">+5 ХП</button></div></div><div class="card"><h3>Состояние</h3>${renderStatusBlock(p)}</div></div><div class="card" style="margin-top:14px"><h3>Падение и смерть</h3>${renderDeathDots(p)}</div><div class="card" style="margin-top:14px"><h3>Враги на поле и атака</h3><p class="sub">Кубики игрок кидает сам. Здесь только выбирает цель и вписывает итог атаки и урон.</p>${alive.length?`<div class="enemy-player-grid">${alive.map(([id,m],i)=>renderEnemyChoice(id,m,i===0)).join("")}</div><div class="grid two" style="margin-top:12px"><div class="field"><label>Итог броска атаки</label><input id="playerHitRoll" type="number" placeholder="например 17"></div><div class="field"><label>Урон</label><input id="playerDamageRoll" type="number" placeholder="например 8"></div></div><div class="box blue"><b>Что кидать</b><p>Атака: кинь <b>d20</b> и прибавь ${fmt(mod(p.stats[(WEAPONS[p.weaponKey]||WEAPONS.rapier).ability])+prof(p.level))}. Формула: ${esc(p.attackText||p.attack)}.</p><p>Урон при попадании: <b>${esc((WEAPONS[p.weaponKey]||WEAPONS.rapier).damageDie)}</b> + модификатор. Формула: ${esc(p.damage)}.${p.bonus?` Приём класса: добавь <b>${esc(p.bonus)}</b>, если условие выполнено.`:""}</p></div>${renderCombatItems(p)}<button class="btn main full" style="margin-top:12px" onclick="playerAttackMonster()">Отправить атаку мастеру</button>`:`<div class="empty">Живых врагов сейчас нет.</div>`}</div><div class="card" style="margin-top:14px"><h3>Активные приёмы класса</h3><p class="sub">Активные — ты сам решаешь сделать это в ход. Пассивные — работают сами, когда условие подходит.</p>${renderAbilityCards(acts.combat,"active")}</div><div class="card" style="margin-top:14px"><h3>Пассивные вещи и раса</h3><div class="grid two"><div>${renderAbilityCards(acts.passive,"passive")}</div><div>${renderAbilityCards((race.combat||race.features||[]),"passive")}</div></div></div><div class="card" style="margin-top:14px"><h3>Когда мастер просит бросок в бою</h3><p class="sub">Инициатива — кто ходит раньше. Спасбросок — защита от ловушки, яда, магии, страха или другого эффекта.</p><div class="grid two"><div class="box blue"><b>Инициатива</b><p>Кидай d20 ${fmt(p.initiative)}. Это Ловкость ${fmt(mod(p.stats.dex))}.</p></div><div class="box blue"><b>Спасброски класса</b><p>${(p.saves||[]).map(s=>AB[s][0]+" "+fmt(saveBonus(s,p))).join(" · ")}</p><p class="small">Остальные спасброски тоже можно кидать, просто без мастерства.</p></div></div></div>`}
function renderEnemyChoice(id,m,checked=false){const dead=m.status==="dead"||Number(m.hp||0)<=0;return`<label class="enemy-choice ${dead?"dead":""}"><input type="radio" name="playerTargetRadio" id="playerTarget_${id}" value="${id}" ${checked?"checked":""} onchange="document.getElementById('playerTargetHidden').value=this.value"><span><b>${esc(m.name)} ${dead?"— повержен":""}</b><p>${dead?"Враг уже не сражается.":"Нажми, чтобы выбрать цель."}</p></span></label>${checked?`<input type="hidden" id="playerTargetHidden" value="${id}">`:""}`}
function renderCombatItems(p){const items=(p.items||[]).map(itemObj).filter(it=>it.combat||/зелье|меч|лук|кинжал|оруж|стрел|щит|доспех|посох|булава|рапира|топор|арбалет/i.test(it.name));if(!items.length)return"";return`<div class="box green" style="margin-top:10px"><b>Боевые предметы</b><div class="combat-items">${items.map(it=>`<div class="chip green">${esc(it.name)}${it.qty>1?" × "+it.qty:""}</div>`).join("")}</div></div>`}
function renderEnemyForPlayer(id,m){const dead=m.status==="dead"||Number(m.hp||0)<=0;return`<div class="box ${dead?"red":"yellow"} ${dead?"dead":""}"><b>${esc(m.name)} ${dead?"— повержен":""}</b><p>${dead?"Враг больше не может сражаться.":"Враг на поле. ХП и КД знает мастер."}</p></div>`}
function renderWorld(){const p=state.player,acts=CLASS_ACTIONS[p.classKey]||CLASS_ACTIONS.rogue,race=RACES[p.raceKey]||RACES.human;return`<div class="hero"><h2>Мир</h2><p>Сцену мастер рассказывает голосом. Здесь подсказки: что можно сделать и какой бросок просить.</p></div><div class="card"><h3>Частые действия и что кидать</h3><p class="sub">Любой персонаж может попробовать любое действие. Сильный класс просто чаще получает хороший бонус.</p><div class="grid two">${worldAction("Украсть предмет",skillFormulaText("sleight",p),"Карман, ключ, подмена, маленький фокус.")}${worldAction("Спрятаться",skillFormulaText("stealth",p),"Пройти тихо, скрыться за укрытием, подкрасться.")}${worldAction("Найти ловушку",skillFormulaText("perception",p)+" или "+skillFormulaText("investigation",p),"Восприятие — заметить. Расследование — понять механизм.")}${worldAction("Уговорить NPC",skillFormulaText("persuasion",p),"Если врёшь — Обман. Если давишь — Запугивание.")}${worldAction("Выломать дверь",skillFormulaText("athletics",p),"Не только варвар: плут тоже может попробовать ради прикола.")}${worldAction("Понять магию",skillFormulaText("arcana",p),"Руны, артефакты, заклинания, магический след.")}</div></div><div class="grid two" style="margin-top:14px"><div class="card"><h3>Класс в мире</h3><p class="sub">Это не запрет для других, а сильные стороны твоего класса вне боя.</p>${renderAbilityCards(acts.world,"active")}</div><div class="card"><h3>Раса в мире</h3><p class="sub">Это особенности происхождения: зрение, размер, стойкость, репутация, природные плюсы.</p>${renderAbilityCards((race.world||race.features||[]),"passive")}</div></div>`}
function skillFormulaText(k,p){return `d20 ${fmt(skillBonusRaw(k,p.stats,p.skills,p.level,p.expertise))} · ${SKILLS[k][0]}`}
function worldAction(t,f,d){return`<div class="box yellow"><b>${t}</b><p>${f}</p><p>${d}</p></div>`}
function renderSkills(){const p=normalizePlayer(state.player);return`<div class="hero"><h2>Навыки</h2><p>Здесь только подсказки: что проверять и какой бонус прибавлять. Кубик игрок кидает сам.</p></div><div class="grid three">${Object.entries(SKILLS).map(([k,s])=>{const has=!!p.skills?.[k],ex=!!p.expertise?.[k]&&has;return`<div class="box ${ex?"purple":has?"green":""}"><b>${s[0]} ${fmt(skillBonusRaw(k,p.stats,p.skills,p.level,ex?{[k]:true}:{}))}</b><p><b>Кидать:</b> d20 ${fmt(skillBonusRaw(k,p.stats,p.skills,p.level,ex?{[k]:true}:{}))}</p><p>${AB[s[1]][0]} ${fmt(mod(p.stats[s[1]]??10))}${has?" + мастерство "+fmt(prof(p.level)):""}${ex?" + экспертиза "+fmt(prof(p.level)):""}</p><p>${s[2]}</p></div>`}).join("")}</div>`}
function renderCharacter(){const p=normalizePlayer(state.player),cls=CLASSES[p.classKey]||CLASSES.rogue,race=RACES[p.raceKey]||RACES.human,bg=BACKGROUNDS[p.bgKey]||BACKGROUNDS.acolyte,al=ALIGNMENTS[p.alignmentKey]||ALIGNMENTS.nn;return`<div class="hero"><h2>Персонаж</h2><p>Главные цифры — модификаторы: +3, +2, +1, 0, -1. Значения 8–16 второстепенные.</p></div><div class="card dark"><h3>Твои кубики</h3><p class="sub">Держи под рукой именно эти кубики. Остальные нужны редко.</p>${renderDiceChips(p.classKey,p.weaponKey,p.bonus)}</div><div class="grid two" style="margin-top:14px"><div class="card"><h3>Характеристики</h3><div class="stats">${Object.entries(AB).map(([k,v])=>`<div class="stat"><span>${v[1]}</span><b>${fmt(mod(p.stats[k]??10))}</b><div class="score">значение ${p.stats[k]??10}</div></div>`).join("")}</div></div><div class="card"><h3>Спасброски</h3><p class="sub">Защита от ловушек, яда, магии, страха и опасных эффектов.</p><div class="grid two" style="margin-top:12px">${Object.entries(AB).map(([k,v])=>`<div class="box ${p.saves?.includes(k)?"green":""}"><b>${v[0]} ${fmt(saveBonus(k,p))}</b><p>${p.saves?.includes(k)?"выделен классом: +"+prof(p.level):"обычный спасбросок"}</p></div>`).join("")}</div></div></div><div class="card" style="margin-top:14px"><h3>Навыки и экспертиза</h3><p class="sub">Навык — прибавляется мастерство один раз. Экспертиза — прибавляется ещё раз, только если навык реально выбран.</p><div class="grid three">${Object.entries(SKILLS).map(([k,s])=>{const has=!!p.skills?.[k],ex=!!p.expertise?.[k]&&has;return`<div class="box ${ex?"purple":has?"green":""}"><b>${s[0]} ${fmt(skillBonusRaw(k,p.stats,p.skills,p.level,ex?{[k]:true}:{}))}</b><p>${s[2]}</p><p>${AB[s[1]][0]} ${fmt(mod(p.stats[s[1]]??10))}${has?" + мастерство "+fmt(prof(p.level)):""}${ex?" + экспертиза "+fmt(prof(p.level)):""}</p></div>`}).join("")}</div></div><div class="grid two" style="margin-top:14px"><div class="card"><h3>Раса: ${esc(race.name)}</h3><p>${esc(race.bonus)}. ${esc(race.tip)}</p><div class="chips">${(race.features||[]).map(x=>`<span class="chip green">${esc(x)}</span>`).join("")}</div></div><div class="card"><h3>Класс: ${esc(cls.name)}</h3><p>${esc(cls.role)}</p><div class="chips">${(cls.features||[]).map(x=>`<span class="chip blue">${esc(x)}</span>`).join("")}</div></div><div class="card"><h3>Предыстория: ${esc(bg.name)}</h3><p>${esc(bg.feature)}</p></div><div class="card"><h3>Мировоззрение: ${esc(al[0])}</h3><p>${esc(al[1])}</p></div></div>${renderClassLevelRoadmap(p)}${renderGlossary()}<div class="grid two" style="margin-top:14px"><button class="btn bad full" onclick="resetMyCharacter()">Сбросить персонажа и создать заново</button><button class="btn bad full" onclick="playerFinish()">Закончить игру этим персонажем</button></div>`}
function itemObj(it){if(typeof it==="object"&&it)return{name:it.name||"Предмет",qty:Number(it.qty||1),combat:!!it.combat,notes:it.notes||""};return{name:String(it||"Предмет"),qty:1,combat:/зелье|меч|лук|кинжал|оруж|стрел|щит|доспех|посох|булава|рапира|топор|арбалет/i.test(String(it||"")),notes:""}}
function itemText(it){const o=itemObj(it);return o.name+(o.qty>1?" × "+o.qty:"")+(o.notes?" — "+o.notes:"")}
function renderBag(){const p=normalizePlayer(state.player),items=(p.items||[]).map(itemObj);return`<div class="hero"><h2>Сумка</h2><p>Предметы, деньги, заметки. Количество указывается отдельно. Боевые предметы появятся в бою рядом с оружием.</p></div><div class="grid two"><div class="card"><h3>Предметы</h3><div class="stack">${items.map((it,i)=>`<div class="box green item-card"><button class="xbtn" onclick="removeMyItem(${i})" title="убрать">×</button><b>${esc(it.name)}</b><p>Количество: ${it.qty}${it.combat?" · боевой предмет":""}</p>${it.notes?`<p>${esc(it.notes)}</p>`:""}</div>`).join("")||`<div class="empty">Пусто.</div>`}</div><div class="grid two" style="margin-top:12px"><div class="field"><label>Предмет</label><input id="myNewItem" placeholder="Зелье лечения"></div><div class="field"><label>Количество</label><input id="myNewQty" type="number" min="1" value="1"></div></div><label class="check" style="margin-bottom:12px"><input type="checkbox" id="myNewCombat"><span><b>Показывать в бою</b><br><small>оружие, зелья, стрелы, щит, боевые расходники</small></span></label><button class="btn main full" onclick="addMyItem()">Добавить</button></div><div class="card"><h3>Деньги и заметки</h3><div class="stats"><div class="stat"><span>зм</span><b>${p.coins?.gp||0}</b></div><div class="stat"><span>см</span><b>${p.coins?.sp||0}</b></div><div class="stat"><span>мм</span><b>${p.coins?.cp||0}</b></div></div><div class="grid three" style="margin-top:12px"><input id="selfGp" type="number" placeholder="зм"><input id="selfSp" type="number" placeholder="см"><input id="selfCp" type="number" placeholder="мм"></div><button class="btn full" style="margin-top:8px" onclick="changeMyCoins()">Изменить деньги</button><div class="field" style="margin-top:12px"><label>Мои заметки</label><textarea oninput="updateMyPlayer({notes:this.value})">${esc(p.notes||"")}</textarea></div></div></div>`}
function changeMyCoins(){const p=state.player;if(!p)return;const coins={gp:Number(val("selfGp")||p.coins?.gp||0),sp:Number(val("selfSp")||p.coins?.sp||0),cp:Number(val("selfCp")||p.coins?.cp||0)};updateMyPlayer({coins});addEvent("reward","Деньги изменены",p.name+" обновил деньги: "+coins.gp+" зм, "+coins.sp+" см, "+coins.cp+" мм.","all")}
function renderSheet(){const p=normalizePlayer(state.player),cls=CLASSES[p.classKey]||CLASSES.rogue,race=RACES[p.raceKey]||RACES.human,bg=BACKGROUNDS[p.bgKey]||BACKGROUNDS.acolyte,skillsList=Object.entries(SKILLS),items=(p.items||[]).map(itemText);const attackRows=[`${p.weapon}: ${p.attackText||p.attack} · урон ${p.damage}`,p.bonus?`Приём класса: ${p.bonus}`:"",...items.filter(x=>/зелье|меч|лук|кинжал|оруж|стрел|щит|доспех|посох|булава|рапира|топор|арбалет/i.test(x)).slice(0,3)].filter(Boolean);return`<div class="hero"><h2>Лист A4</h2><p>Один лист персонажа для печати или PDF.</p></div>${state.justCreated?`<div class="box green" style="margin-bottom:14px"><b>Персонаж готов!</b><p>Он сохранён в комнате и уже появился у мастера.</p><button class="btn main full" style="margin-top:10px" onclick="state.justCreated=false;saveLocal();setTab('playerCombat')">Всё готово, идём в бой →</button></div>`:""}<div class="card"><button class="btn main full" onclick="window.print()">Печать / сохранить PDF</button></div><div class="sheet-a4"><div class="shead"><div class="sbox"><div class="stitle">Имя персонажа</div><div class="name">${esc(p.name)}</div></div><div class="sbox info-grid"><div class="info-cell"><b>${esc(p.className)} ${p.level}</b><br><span>Класс и уровень</span></div><div class="info-cell"><b>${esc(p.bgName)}</b><br><span>Предыстория</span></div><div class="info-cell"><b>${esc(state.masterName||"")}</b><br><span>Имя игрока</span></div><div class="info-cell"><b>${esc(p.raceName)}</b><br><span>Раса</span></div><div class="info-cell"><b>${esc(p.alignment)}</b><br><span>Мировоззрение</span></div><div class="info-cell"><b>${p.xp}</b><br><span>Опыт</span></div></div></div><div class="ability-col">${Object.entries(AB).map(([k,v])=>`<div class="ability-box"><b>${v[0]}</b><div class="mod">${fmt(mod(p.stats[k]??10))}</div><div class="score">${p.stats[k]??10}</div></div>`).join("")}</div><div class="save-skill"><div class="sbox"><div class="stitle">Бонус мастерства</div><div class="big-num">${fmt(prof(p.level))}</div></div><div class="sbox"><div class="stitle">Спасброски</div>${Object.entries(AB).map(([k,v])=>`<div class="line"><span class="circle ${p.saves?.includes(k)?"on":""}"></span><b>${fmt(saveBonus(k,p))}</b><span>${v[0]}</span></div>`).join("")}</div><div class="sbox"><div class="stitle">Навыки</div>${skillsList.map(([k,v])=>`<div class="line"><span class="circle ${p.skills?.[k]?"on":""}"></span><b>${fmt(skillBonusRaw(k,p.stats,p.skills,p.level,p.expertise))}</b><span>${v[0]} (${AB[v[1]][1]})</span></div>`).join("")}</div><div class="sbox"><div class="stitle">Пассивная мудрость</div><div class="big-num">${p.passive}</div></div><div class="sbox lined"><div class="stitle">Прочие владения и языки</div><p class="smalltext">${esc((cls.features||[]).join(", "))}</p></div></div><div class="hp-zone"><div class="mini-stat"><div class="sbox"><div class="stitle">КД</div><div class="big-num">${p.ac}</div></div><div class="sbox"><div class="stitle">Инициатива</div><div class="big-num">${fmt(p.initiative)}</div></div><div class="sbox"><div class="stitle">Скорость</div><div class="big-num">9 м</div></div></div><div class="sbox"><div class="stitle">Максимум хитов</div><div class="mutedline">${p.maxHp}</div><div class="stitle">Текущие хиты</div><div class="mutedline">${p.hp}</div></div><div class="sbox"><div class="stitle">Временные хиты</div><div class="mutedline">${p.tempHp||0}</div></div><div class="mini-stat"><div class="sbox"><div class="stitle">Кость хитов</div><div class="big-num">d${cls.hit||8}</div></div><div class="sbox"><div class="stitle">Спасброски от смерти</div><div class="death-row"><span>Успехи</span><span class="death-dots">${[1,2,3].map(i=>`<span class="tiny-dot ${(p.death?.ok||0)>=i?"on":""}"></span>`).join("")}</span></div><div class="death-row"><span>Провалы</span><span class="death-dots">${[1,2,3].map(i=>`<span class="tiny-dot ${(p.death?.fail||0)>=i?"on":""}"></span>`).join("")}</span></div></div></div><div class="sbox attacks"><div class="stitle">Атаки и заклинания</div>${attackRows.map(x=>`<div class="mutedline">${esc(x)}</div>`).join("")}<div class="lined" style="height:40mm"></div></div><div class="sbox equipment"><div class="stitle">Снаряжение</div><p class="smalltext">${items.map(esc).join("; ")}</p><p class="smalltext">Деньги: ${p.coins?.gp||0} зм · ${p.coins?.sp||0} см · ${p.coins?.cp||0} мм</p></div></div><div class="rightcol right-bottom"><div class="sbox lined"><div class="stitle">Черты характера</div></div><div class="sbox lined"><div class="stitle">Идеалы</div></div><div class="sbox lined"><div class="stitle">Привязанности</div></div><div class="sbox lined"><div class="stitle">Слабости</div></div><div class="sbox features lined"><div class="stitle">Умения и особенности</div><p class="smalltext">${esc((cls.features||[]).join(", "))}. ${esc((race.features||[]).join(", "))}. ${esc(bg.feature||"")}</p></div></div></div>`}
function renderRollRequest(roll,p){const formula=rollFormulaForSkill(roll.skill,p);return`<div class="box blue" style="margin-bottom:14px"><b>Мастер просит бросок</b><p>${esc(roll.text)}</p><p><b>${esc(formula)}</b></p><button class="btn main full" style="margin-top:10px" onclick="rollForRequest()">🎲 Бросить за меня</button><p class="small">Кнопка бросит d20 и сама прибавит цифру. Итог сразу увидит мастер.</p></div>`}function addMyItem(){const name=val("myNewItem").trim();if(!name||!state.player)return;const qty=Math.max(1,Number(val("myNewQty")||1)),combat=!!document.getElementById("myNewCombat")?.checked,item={name,qty,combat};updateMyPlayer({items:[...(state.player.items||[]),item]});addEvent("reward","Предмет добавлен",state.player.name+" добавил предмет: "+name+(qty>1?" × "+qty:"")+".","all")}function removeMyItem(i){const items=[...(state.player.items||[])],removed=itemText(items[i]);items.splice(i,1);updateMyPlayer({items});addEvent("reward","Предмет убран",state.player.name+" убрал предмет: "+removed+".","all")}
function fillClassDefaults(){const cls=CLASSES[val("cClass")];if(!cls)return;Object.entries(defaultStats(val("cClass"))).forEach(([k,v])=>{const el=document.getElementById("stat_"+k);if(el)el.value=v});const ac=document.getElementById("cAc");if(ac)ac.value=cls.ac;applySuggestedSkills();applySuggestedSaves();applySuggestedExpertise();applySuggestedWeapon()}function applySuggestedSaves(){Object.keys(AB).forEach(k=>{const el=document.getElementById("save_"+k);if(el)el.checked=false});const cls=CLASSES[val("cClass")]||CLASSES.rogue;(cls.saves||[]).forEach(k=>{const el=document.getElementById("save_"+k);if(el)el.checked=true})}
function applySuggestedExpertise(){Object.keys(SKILLS).forEach(k=>{const el=document.getElementById("expert_"+k);if(el)el.checked=false});if(val("cClass")==="rogue"){["stealth","sleight"].forEach(k=>{const el=document.getElementById("expert_"+k);if(el)el.checked=true})}}
function applySuggestedSkills(){Object.keys(SKILLS).forEach(k=>{const el=document.getElementById("skill_"+k);if(el)el.checked=false});const cls=CLASSES[val("cClass")]||CLASSES.rogue,bg=BACKGROUNDS[val("cBg")]||BACKGROUNDS.acolyte;[...cls.skills,...bg.skills].forEach(k=>{const el=document.getElementById("skill_"+k);if(el)el.checked=true})}function applySuggestedWeapon(){Object.keys(WEAPONS).forEach(k=>{const el=document.getElementById("weapon_"+k);if(el)el.checked=false});const cls=CLASSES[val("cClass")]||CLASSES.rogue,el=document.getElementById("weapon_"+cls.weapon);if(el)el.checked=true}function defaultStats(c){
  const map={
    barbarian:{str:16,dex:14,con:16,int:8,wis:10,cha:10},
    bard:{str:8,dex:14,con:14,int:10,wis:10,cha:16},
    cleric:{str:12,dex:10,con:14,int:10,wis:16,cha:12},
    druid:{str:8,dex:14,con:14,int:12,wis:16,cha:10},
    fighter:{str:16,dex:12,con:15,int:10,wis:12,cha:8},
    monk:{str:10,dex:16,con:14,int:8,wis:14,cha:10},
    paladin:{str:16,dex:10,con:14,int:8,wis:12,cha:14},
    rogue:{str:8,dex:16,con:14,int:12,wis:12,cha:10},
    ranger:{str:10,dex:16,con:14,int:10,wis:14,cha:8},
    sorcerer:{str:8,dex:14,con:14,int:10,wis:10,cha:16},
    warlock:{str:8,dex:14,con:14,int:10,wis:12,cha:16},
    wizard:{str:8,dex:14,con:14,int:16,wis:12,cha:10}
  };
  return map[c]||map.rogue;
}

function toggleHint(id){document.getElementById(id)?.classList.toggle("show")}
function renderStatusCheatsheet(){const TRIGGERS={normal:"Убери это состояние, когда причина закончилась (вылечили, эффект прошёл).",wounded:"Ставь сам, когда ХП игрока опустилось до половины максимума или ниже.",down:"Ставится само, когда ХП доходит до 0. Дальше — спасброски от смерти.",poisoned:"Ставь, если атака яда/ловушки/чудовища попала и игрок провалил спасбросок Телосложения.",frightened:"Ставь, если провален спасбросок от испуга (вид монстра, заклинание страха и т.п.).",invisible:"Ставь, когда сработало зелье или заклинание невидимости.",concentration:"Ставь, когда игрок поддерживает заклинание с концентрацией. Убирай, если он потерял сознание, умер или сам прекратил."};return`<div class="card dark"><h3>Шпаргалка: что накладывать на игроков и когда <button class="help" onclick="toggleHint('hStatusCheat')" type="button">?</button></h3><div id="hStatusCheat" class="hint box yellow show"><div class="grid two">${Object.entries(STATUS).map(([k,v])=>`<div class="box ${v[2]}"><b>${v[0]}</b><p>${v[1]}</p><p class="small">${TRIGGERS[k]||""}</p></div>`).join("")}</div></div></div>`}
function randomHero(){const classKeys=Object.keys(CLASSES),raceKeys=Object.keys(RACES),bgKeys=Object.keys(BACKGROUNDS),alignKeys=Object.keys(ALIGNMENTS),names=["Мускат","Ирвин","Тея","Кор","Лисса","Гром","Ния","Барт","Сола","Рен","Финн","Аста"];const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v};set("cClass",classKeys[Math.floor(Math.random()*classKeys.length)]);set("cRace",raceKeys[Math.floor(Math.random()*raceKeys.length)]);set("cBg",bgKeys[Math.floor(Math.random()*bgKeys.length)]);set("cAlign",alignKeys[Math.floor(Math.random()*alignKeys.length)]);set("cName",names[Math.floor(Math.random()*names.length)]);fillClassDefaults();applySuggestedSkills();applySuggestedSaves();applySuggestedExpertise();applySuggestedWeapon();renderCreatePlayerRefresh()}
window.state=state;window.saveLocal=saveLocal;window.setTab=id=>{state.tab=id;if(id!=="playerSheet")state.justCreated=false;saveLocal();render();window.scrollTo({top:0,behavior:"smooth"});setTimeout(()=>{if(id==="playerCreate"){fillClassDefaults();renderCreatePlayerRefresh()}},50)};Object.assign(window,{closePopup,makeRoom,joinMaster,joinPlayerRoom,backToHome,createPlayer,resetMyCharacter,fillClassDefaults,renderCreatePlayerRefresh,applySuggestedSkills,applySuggestedWeapon,toggleHint,updateMyPlayer,damagePlayer,healPlayer,myDamage,myHeal,addXpPlayer,setStatusPlayer,deletePlayer,playerFinish,addMonster,damageMonster,healMonster,removeMonster,playerAttackMonster,addNpc,removeNpc,updateNpcField,addCustomNpc,giveItem,giveCoins,sendSecret,clearSecret,requestRoll,clearRollRequest,updateScene,addManualEvent,removeEvent,setJournalFilter,clearCombat,clearEvents,resetRoom,resetLocal,addMyItem,removeMyItem,changeMyCoins,rollMySkill,rollForRequest,rollMyAttack,rollMyDamage,rollMyBonusDamage,rollDeathSave,rollMonsterAttack,randomHero,clearPendingRoll,setDeathMark,requestRollPreset,addMasterNote,removeMasterNote});render();setTimeout(()=>{if(state.tab==="playerCreate"){fillClassDefaults();renderCreatePlayerRefresh()}},100);
</script>
