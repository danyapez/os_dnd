window.requestRoll=function(){let sk=val('rollSkill'),txt=val('rollText')||'Мастер просит бросок';dbSet(rpath('rollRequest'),{skill:sk,text:txt,createdAt:Date.now()});addEvent('roll','Проверка',txt,'all')};window.clearRoll=function(){dbRem(rpath('rollRequest'))};window.secret=function(id){let t=val('secret_'+id);if(!t)return;dbSet(rpath('secrets/'+id),{text:t,createdAt:Date.now()});addEvent('secret','Тайное сообщение',t,id)};window.clearSecret=function(){dbRem(rpath('secrets/'+state.playerId))};window.saveScene=function(){dbUp(rpath('scene'),{publicText:val('scenePublic'),masterNotes:val('sceneNotes'),updatedAt:Date.now()});addEvent('world','Сцена обновлена','Мастер обновил описание сцены','all')};window.manualEvent=function(){addEvent(val('evKind'),val('evTitle')||'Сообщение',val('evText')||'',val('evTarget')||'all')};window.setFilter=function(f){state.filter=f;save();render()};window.remEvent=function(id){dbRem(rpath('events/'+id))};window.clearCombat=function(){dbRem(rpath('monsters'));dbRem(rpath('rollRequest'));addEvent('battle','Бой очищен','Мастер очистил боевую доску','all')};window.clearEvents=function(){dbRem(rpath('events'))};window.resetRoom=function(){if(!confirm('Сбросить всю комнату?'))return;dbRem(rpath());state=fresh();save();render()};window.resetLocal=function(){localStorage.removeItem(LS);state=fresh();render()};window.setTab=function(t){state.tab=t;save();render();scrollTo(0,0)};
function header(){let tabs='';if(state.mode==='master')tabs=[['masterPlayers','Игроки'],['masterCombat','Бой'],['masterBestiary','Монстры'],['masterLoot','Лут'],['masterScenes','Сцены'],['masterEvents','Журнал'],['masterReset','Сброс']];if(state.mode==='player'&&state.player)tabs=[['playerCombat','Бой'],['playerWorld','Мир'],['playerSkills','Навыки'],['playerChar','Персонаж'],['playerBag','Сумка'],['playerSheet','Лист A4'],['playerEvents','Журнал']];if(state.mode==='player'&&!state.player)tabs=[['playerCreate','Создание']];return '<div class="top no-print"><div class="head"><div class="logo">d20</div><div class="brand"><h1>D&D помощник</h1><p>реалтайм · бой · мир · лист A4</p></div>'+(state.roomId?'<div class="room">'+esc(state.roomId)+'</div>':'')+'</div>'+(state.mode?'<div class="tabs">'+tabs.map(t=>'<button class="tab '+(state.tab===t[0]?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>').join('')+'<button class="tab" onclick="backHome()">К выбору</button></div>':'')+'</div>'}
function popup(){if(!state.popup)return'';let e=state.popup;return '<div class="popbg"><div class="popup"><h2>'+esc(e.title)+'</h2><p>'+esc(e.text)+'</p><button class="btn main full" style="margin-top:14px" onclick="closePopup()">Понял</button></div></div>'}
function render(){save();let html=header()+popup()+body();app.innerHTML=html;if(state.tab==='playerCreate')setTimeout(window.fillDefaults,0)}
function body(){if(!state.mode)return home();if(state.mode==='master')return master();return player()}
function home(){return '<div class="hero"><h2>Кто ты?</h2><p>Одна ссылка для мастера и игроков. Мастер создаёт комнату, игроки вводят код.</p></div><div class="grid two"><div class="card"><h3>Я мастер</h3><p class="sub">Создать комнату, видеть игроков, врагов, бой, лут и журнал.</p><div class="field"><label>Код комнаты</label><input id="roomNew" placeholder="ЛЕС, 1234, БОСС"></div><button class="btn main full" onclick="makeRoom()">Создать комнату</button><div class="field" style="margin-top:14px"><label>Войти как мастер</label><input id="roomMaster" placeholder="код комнаты"></div><button class="btn full" onclick="joinMaster()">Войти</button></div><div class="card"><h3>Я игрок</h3><p class="sub">Войти по коду и создать персонажа.</p><div class="field"><label>Код комнаты</label><input id="roomPlayer" placeholder="код от мастера"></div><button class="btn main full" onclick="joinPlayer()">Войти как игрок</button><div class="box blue" style="margin-top:14px"><b>Важно</b><p>Игроки видят только названия врагов. ХП и КД врагов скрыты.</p></div></div></div>'}
function master(){if(state.tab==='masterCombat')return masterCombat();if(state.tab==='masterBestiary')return bestiary();if(state.tab==='masterLoot')return loot();if(state.tab==='masterScenes')return scenes();if(state.tab==='masterEvents')return events();if(state.tab==='masterReset')return reset();return masterPlayers()}
function masterPlayers(){let ps=Object.values(roomData.players||{});return '<div class="hero"><h2>Доска мастера</h2><p>Код комнаты: <b>'+esc(state.roomId)+'</b>. Игроки, ХП, КД, статусы, опыт, тайные сообщения.</p></div><div class="card"><h3>Попросить бросок</h3><div class="grid three"><div class="field"><label>Проверка</label><select id="rollSkill">'+Object.entries(SK).map(([k,v])=>'<option value="'+k+'">'+v[0]+'</option>').join('')+'<option value="initiative">Инициатива</option><option value="saveDex">Спасбросок Ловкости</option><option value="saveCon">Спасбросок Телосложения</option></select></div><div class="field"><label>Текст</label><input id="rollText" placeholder="Киньте Восприятие"></div><div class="field"><label>&nbsp;</label><button class="btn main full" onclick="requestRoll()">Попросить</button></div></div><button class="btn" onclick="clearRoll()">Убрать запрос</button></div><div class="grid two" style="margin-top:14px">'+(ps.length?ps.map(masterPlayer).join(''):'<div class="empty">Игроков пока нет.</div>')+'</div>'}
function masterPlayer(p){let st=STATUS[p.status||'normal']||STATUS.normal, pct=Math.max(0,Math.min(100,(p.hp||0)/(p.maxHp||1)*100));return '<div class="card"><div class="btnrow" style="justify-content:space-between"><div><h3>'+esc(p.name)+'</h3><p class="sub">'+race(p).name+' · '+cls(p).name+' · '+p.level+' ур.</p></div><span class="chip '+st[2]+'">'+st[0]+'</span></div><div class="stats"><div class="stat"><span>ХП</span><b>'+p.hp+'/'+p.maxHp+'</b></div><div class="stat"><span>КД</span><b>'+p.ac+'</b></div><div class="stat"><span>Пасс.</span><b>'+p.passive+'</b></div><div class="stat"><span>Иниц.</span><b>'+fmt(p.initiative)+'</b></div><div class="stat"><span>Опыт</span><b>'+(p.xp||0)+'</b></div></div><div class="hp"><div style="width:'+pct+'%"></div></div><div class="box blue" style="margin-top:12px"><b>Атака</b><p>'+esc(atkText(p))+'. Урон: '+esc(dmgText(p))+(p.classKey==='rogue'?'. Скрытая атака: '+sneak(p):'')+'</p></div><div class="btnrow" style="margin-top:14px"><button class="btn" onclick="damagePlayer(\''+p.id+'\',1)">-1</button><button class="btn" onclick="damagePlayer(\''+p.id+'\',5)">-5</button><button class="btn" onclick="damagePlayer(\''+p.id+'\',10)">-10</button><button class="btn green" onclick="healPlayer(\''+p.id+'\',5)">+5 ХП</button></div><div class="grid two" style="margin-top:12px"><div class="field"><label>Состояние</label><select onchange="statusPlayer(\''+p.id+'\',this.value)">'+Object.entries(STATUS).map(([k,v])=>'<option value="'+k+'" '+((p.status||'normal')===k?'selected':'')+'>'+v[0]+'</option>').join('')+'</select></div><div class="field"><label>Опыт</label><input id="xp_'+p.id+'" type="number" placeholder="150"></div></div><button class="btn full" onclick="addXpPlayer(\''+p.id+'\',document.getElementById(\'xp_'+p.id+'\').value)">Дать опыт</button><div class="field" style="margin-top:12px"><label>Тайное сообщение</label><input id="secret_'+p.id+'" placeholder="Ты заметил, что торговец врёт"></div><div class="btnrow"><button class="btn full" onclick="secret(\''+p.id+'\')">Отправить тайно</button><button class="btn red full" onclick="delPlayer(\''+p.id+'\')">Удалить</button></div></div>'}
function masterCombat(){let ms=roomData.monsters||{};return '<div class="hero"><h2>Бой</h2><p>Мастер видит ХП и КД врагов. Игроки видят только названия.</p></div><div class="card"><h3>Добавить врага</h3><div class="btnrow">'+Object.entries(MON).map(([k,m])=>'<button class="btn" onclick="addMonster(\''+k+'\')">+ '+m.name+'</button>').join('')+'</div></div><div class="grid two" style="margin-top:14px">'+(Object.keys(ms).length?Object.entries(ms).map(([id,m])=>monsterCard(id,m)).join(''):'<div class="empty">Монстров пока нет.</div>')+'</div>'}
function monsterCard(id,m){let dead=m.status==='dead'||Number(m.hp)<=0,pct=Math.max(0,Math.min(100,(m.hp||0)/(m.maxHp||1)*100));return '<div class="card '+(dead?'dead':'')+'"><h3>'+esc(m.name)+(dead?' — повержен':'')+'</h3><p class="sub">'+esc(m.type)+' · '+esc(m.cat)+'</p><div class="stats"><div class="stat"><span>ХП</span><b>'+m.hp+'/'+m.maxHp+'</b></div><div class="stat"><span>КД</span><b>'+m.ac+'</b></div><div class="stat"><span>Атака</span><b>'+esc(m.attack)+'</b></div><div class="stat"><span>Урон</span><b>'+esc(m.damage)+'</b></div><div class="stat"><span>Тип</span><b>'+esc(m.type)+'</b></div></div><div class="hp"><div style="width:'+pct+'%"></div></div><div class="box yellow" style="margin-top:10px"><b>Поведение</b><p>'+esc(m.behavior)+'</p></div><div class="box green" style="margin-top:10px"><b>Лут</b><p>'+esc(m.loot)+'</p></div><div class="btnrow" style="margin-top:12px"><button class="btn" onclick="damageMonster(\''+id+'\',1)">-1</button><button class="btn" onclick="damageMonster(\''+id+'\',5)">-5</button><button class="btn" onclick="damageMonster(\''+id+'\',10)">-10</button><button class="btn green" onclick="healMonster(\''+id+'\',5)">+5</button><button class="btn red" onclick="remMonster(\''+id+'\')">убрать</button></div></div>'}
function bestiary(){return '<div class="hero"><h2>Монстры</h2><p>База врагов. Добавь в бой.</p></div><div class="grid three">'+Object.entries(MON).map(([k,m])=>'<div class="card"><h3>'+m.name+'</h3><p class="sub">'+m.cat+' · '+m.type+'</p><div class="chips"><span class="chip">ХП '+m.hp+'</span><span class="chip">КД '+m.ac+'</span><span class="chip">атака '+m.attack+'</span></div><div class="box yellow" style="margin-top:10px"><p>'+esc(m.behavior)+'</p></div><button class="btn main full" style="margin-top:10px" onclick="addMonster(\''+k+'\')">Добавить</button></div>').join('')+'</div>'}

function player(){let cloud=(roomData.players||{})[state.playerId];if(cloud){state.player=cloud;save()}if(!state.player)return createScreen();if(state.tab==='playerWorld')return world();if(state.tab==='playerSkills')return skills();if(state.tab==='playerChar')return charScreen();if(state.tab==='playerBag')return bag();if(state.tab==='playerSheet')return sheet();if(state.tab==='playerEvents')return events();return combat()}
function createScreen(){return '<div class="hero"><h2>Создание персонажа</h2><p>Класс, раса, предыстория, навыки, экспертиза, оружие и деньги.</p></div><div class="stack"><div class="card"><h3>Кто ты?</h3><div class="grid two"><div class="field"><label>Имя</label><input id="pname" placeholder="Мускат"></div><div class="field"><label>Класс</label><select id="classKey" onchange="fillDefaults()">'+Object.entries(CL).map(([k,c])=>'<option value="'+k+'">'+c.name+'</option>').join('')+'</select></div><div class="field"><label>Раса</label><select id="raceKey">'+Object.entries(RACES).map(([k,r])=>'<option value="'+k+'">'+r.name+'</option>').join('')+'</select></div><div class="field"><label>Предыстория</label><select id="bgKey" onchange="fillDefaults()">'+Object.entries(BGS).map(([k,b])=>'<option value="'+k+'">'+b.name+' — '+b.hint+'</option>').join('')+'</select></div><div class="field"><label>Мировоззрение</label><select id="alignKey">'+Object.entries(ALIGN).map(([k,a])=>'<option value="'+k+'">'+a[0]+' — '+a[1]+'</option>').join('')+'</select></div><div class="field"><label>Уровень</label><select id="level">'+Array.from({length:20},(_,i)=>'<option value="'+(i+1)+'" '+(i===2?'selected':'')+'>'+(i+1)+'</option>').join('')+'</select></div><div class="field"><label>Опыт</label><input id="xp" type="number" value="900"></div></div><div class="box blue" id="classHelp"><b>Подсказка</b><p>Выбери класс, и тут будет подсказка.</p></div></div><div class="card"><h3>Характеристики</h3><p class="sub">Главное — модификаторы +3, +2, +1, 0, -1. Большие числа второстепенные.</p><div class="grid three">'+Object.entries(AB).map(([k,v])=>'<div class="field"><label>'+v[0]+'</label><input id="st_'+k+'" type="number" value="'+DEF.rogue[k]+'"></div>').join('')+'</div><button class="btn blue" onclick="fillDefaults()">Пример под класс</button></div><div class="card"><h3>Навыки</h3><p class="sub">Предыстория и класс ставят навыки. Экспертиза прибавляет мастерство второй раз.</p><div class="checkgrid">'+Object.entries(SK).map(([k,s])=>'<label class="check"><input type="checkbox" id="sk_'+k+'"><span><b>'+s[0]+'</b><br><small>'+AB[s[1]][0]+' · '+s[2]+'</small></span></label>').join('')+'</div><h3 style="margin-top:16px">Экспертиза</h3><div class="checkgrid">'+Object.entries(SK).map(([k,s])=>'<label class="check"><input type="checkbox" id="ex_'+k+'"><span><b>'+s[0]+'</b><br><small>мастерство прибавится второй раз</small></span></label>').join('')+'</div></div><div class="card"><h3>Оружие и деньги</h3><div class="checkgrid">'+Object.entries(WEAP).map(([k,w])=>'<label class="check"><input type="checkbox" id="wp_'+k+'"><span><b>'+w.name+'</b><br><small>атака d20 + '+AB[w.ab][0]+' + мастерство · урон '+w.die+' + '+AB[w.ab][0]+'</small></span></label>').join('')+'</div><div class="grid three" style="margin-top:14px"><div class="field"><label>ЗМ</label><input id="gp" type="number" value="15"></div><div class="field"><label>СМ</label><input id="sp" type="number" value="0"></div><div class="field"><label>ММ</label><input id="cp" type="number" value="0"></div></div><button class="btn main full" onclick="makePlayer()">Готов персонаж</button></div></div>'}
function combat(){let p=state.player,c=cls(p),st=STATUS[p.status||'normal'],sec=(roomData.secrets||{})[state.playerId],roll=roomData.rollRequest,ms=roomData.monsters||{},alive=Object.entries(ms).filter(([id,m])=>m.status!=='dead'&&Number(m.hp)>0),pct=Math.max(0,Math.min(100,(p.hp||0)/(p.maxHp||1)*100));return '<div class="hero"><h2>'+esc(p.name)+': бой</h2><p>'+race(p).name+' · '+c.name+' · '+p.level+' уровень · мастерство '+fmt(prof(p.level))+'</p></div>'+(sec?'<div class="box purple" style="margin-bottom:14px"><b>Тайное сообщение</b><p>'+esc(sec.text)+'</p><button class="btn" onclick="clearSecret()">Понял</button></div>':'')+(roll?rollBox(roll,p):'')+'<div class="grid two"><div class="card"><h3>Здоровье</h3><div class="stats"><div class="stat"><span>ХП</span><b>'+p.hp+'/'+p.maxHp+'</b></div><div class="stat"><span>КД</span><b>'+p.ac+'</b></div><div class="stat"><span>Иниц.</span><b>'+fmt(p.initiative)+'</b></div><div class="stat"><span>Пасс.</span><b>'+p.passive+'</b></div><div class="stat"><span>Врем.</span><b>'+(p.tempHp||0)+'</b></div></div><div class="hp"><div style="width:'+pct+'%"></div></div><div class="btnrow" style="margin-top:14px"><button class="btn" onclick="myDamage(1)">-1</button><button class="btn" onclick="myDamage(5)">-5</button><button class="btn" onclick="myDamage(10)">-10</button><button class="btn green" onclick="myHeal(5)">+5 ХП</button></div></div><div class="card"><h3>Падение и смерть</h3><div class="box '+st[2]+'"><b>'+st[0]+'</b><p>'+st[1]+'</p></div><div class="grid two" style="margin-top:12px"><div class="field"><label>Успехи смерти</label><input type="number" value="'+(p.death?.ok||0)+'" onchange="updateMe({death:{ok:Number(this.value),fail:state.player.death.fail}})"></div><div class="field"><label>Провалы смерти</label><input type="number" value="'+(p.death?.fail||0)+'" onchange="updateMe({death:{ok:state.player.death.ok,fail:Number(this.value)}})"></div></div><div class="field"><label>Состояние</label><select onchange="updateMe({status:this.value})">'+Object.entries(STATUS).map(([k,v])=>'<option value="'+k+'" '+((p.status||'normal')===k?'selected':'')+'>'+v[0]+'</option>').join('')+'</select></div></div></div><div class="card" style="margin-top:14px"><h3>Враги на поле и атака</h3><p class="sub">Игрок видит только названия врагов. ХП и КД скрыты.</p>'+(alive.length?'<div class="field"><label>Кого атакую</label><select id="target">'+alive.map(([id,m])=>'<option value="'+id+'">'+esc(m.name)+'</option>').join('')+'</select></div><div class="grid two"><div class="field"><label>Итог броска атаки</label><input id="hitRoll" type="number" placeholder="например 17"></div><div class="field"><label>Урон</label><input id="dmgRoll" type="number" placeholder="например 8"></div></div><div class="box blue"><b>Как считать</b><p>Атака: '+esc(atkText(p))+'. Урон: '+esc(dmgText(p))+(p.classKey==='rogue'?'. Скрытая атака: '+sneak(p)+' если есть условие.':'')+'</p></div><button class="btn main full" style="margin-top:12px" onclick="playerAttack()">Отправить атаку</button><div class="stack" style="margin-top:14px">'+Object.entries(ms).map(([id,m])=>enemyForPlayer(m)).join('')+'</div>':'<div class="empty">Живых врагов сейчас нет.</div>')+'</div><div class="card" style="margin-top:14px"><h3>Что класс может в бою</h3><div class="grid two"><div class="box red"><b>Активные действия</b>'+c.combat.map(x=>'<p>• '+esc(x)+'</p>').join('')+'</div><div class="box yellow"><b>Пассивные вещи</b>'+c.passive.map(x=>'<p>• '+esc(x)+'</p>').join('')+'<p><b>Раса:</b></p>'+race(p).combat.map(x=>'<p>• '+esc(x)+'</p>').join('')+'</div></div></div><div class="card" style="margin-top:14px"><h3>Боевые проверки</h3><div class="grid two"><div class="box blue"><b>Инициатива</b><p>d20 '+fmt(p.initiative)+' = Ловкость '+fmt(statmod(p,'dex'))+'</p></div><div class="box blue"><b>Спасброски класса</b><p>'+c.saves.map(s=>AB[s][0]+' '+fmt(saveBonus(p,s))).join(' · ')+'</p></div></div></div>'}
function enemyForPlayer(m){let dead=m.status==='dead'||Number(m.hp)<=0;return '<div class="box '+(dead?'red dead':'yellow')+'"><b>'+esc(m.name)+(dead?' — повержен':'')+'</b><p>'+(dead?'Враг больше не может сражаться.':'Враг на поле. ХП и КД скрыты.')+'</p></div>'}
function rollBox(r,p){let f=r.skill==='initiative'?'d20 '+fmt(p.initiative)+' = Ловкость '+fmt(statmod(p,'dex')):r.skill==='saveDex'?'d20 '+fmt(saveBonus(p,'dex'))+' = Ловкость '+fmt(statmod(p,'dex')):r.skill==='saveCon'?'d20 '+fmt(saveBonus(p,'con'))+' = Телосложение '+fmt(statmod(p,'con')):skillFormula(p,r.skill);return '<div class="box blue" style="margin-bottom:14px"><b>Мастер просит бросок</b><p>'+esc(r.text)+'</p><p><b>'+esc(f)+'</b></p><p class="small">Кинь d20, прибавь цифру, скажи мастеру итог.</p></div>'}
function world(){let p=state.player,c=cls(p),s=roomData.scene||{};return '<div class="hero"><h2>'+esc(p.name)+': мир</h2><p>Действия вне боя: разговоры, кражи, поиск, двери, ловушки.</p></div><div class="card"><h3>Что происходит</h3><div class="box blue"><p>'+esc(s.publicText||'Мастер пока ничего не показал.')+'</p></div></div><div class="grid two" style="margin-top:14px"><div class="card"><h3>Класс в мире</h3>'+c.world.map(x=>'<div class="box blue" style="margin-top:8px"><p>'+esc(x)+'</p></div>').join('')+'</div><div class="card"><h3>Раса в мире</h3>'+race(p).world.map(x=>'<div class="box green" style="margin-top:8px"><p>'+esc(x)+'</p></div>').join('')+'</div></div><div class="card" style="margin-top:14px"><h3>Частые действия</h3><div class="grid two">'+wact('Украсть предмет',skillFormula(p,'sleight'),'Если рядом смотрят, мастер может дать помеху.')+wact('Спрятаться',skillFormula(p,'stealth'),'Сравнивается с внимательностью врагов.')+wact('Найти ловушку',skillFormula(p,'perception')+' или '+skillFormula(p,'investigation'),'Восприятие заметить, Расследование понять механизм.')+wact('Уговорить NPC',skillFormula(p,'persuasion'),'Если врёшь — Обман. Если давишь — Запугивание.')+wact('Выломать дверь',skillFormula(p,'athletics'),'Обычно Сила + Атлетика.')+wact('Понять магию',skillFormula(p,'arcana'),'Интеллект + Магия.')+'</div></div>'}
function wact(t,f,d){return '<div class="box yellow"><b>'+t+'</b><p>'+f+'</p><p>'+d+'</p></div>'}
function skills(){let p=state.player;return '<div class="hero"><h2>Навыки</h2><p>Кинь d20 и прибавь число. Главное — прибавка.</p></div><div class="grid three">'+Object.entries(SK).map(([k,s])=>'<div class="box"><b>'+s[0]+' '+fmt(skillBonus(p,k))+'</b><p>'+skillFormula(p,k)+'</p><p>'+s[2]+'</p></div>').join('')+'</div>'}
function charScreen(){let p=state.player,c=cls(p);return '<div class="hero"><h2>Персонаж</h2><p>Главные цифры — модификаторы. Базовые значения второстепенные.</p></div><div class="grid two"><div class="card"><h3>Характеристики</h3><div class="stats">'+Object.entries(AB).map(([k,v])=>'<div class="stat"><span>'+v[1]+'</span><b>'+fmt(statmod(p,k))+'</b><small>значение '+total(p,k)+'</small></div>').join('')+'</div></div><div class="card"><h3>Спасброски</h3><div class="grid two">'+Object.entries(AB).map(([k,v])=>'<div class="box"><b>'+v[0]+' '+fmt(saveBonus(p,k))+'</b><p>'+(c.saves.includes(k)?'есть владение: '+fmt(prof(p.level)):'без владения')+'</p></div>').join('')+'</div></div></div><div class="grid two" style="margin-top:14px"><div class="card"><h3>Раса: '+race(p).name+'</h3><div class="chips">'+race(p).features.map(x=>'<span class="chip white">'+esc(x)+'</span>').join('')+'</div></div><div class="card"><h3>Класс: '+c.name+'</h3><p>'+esc(c.role)+'</p></div><div class="card"><h3>Предыстория: '+bg(p).name+'</h3><p>'+esc(bg(p).hint)+'</p></div><div class="card"><h3>Мировоззрение: '+(ALIGN[p.alignKey]?.[0]||'')+'</h3><p>'+esc(ALIGN[p.alignKey]?.[1]||'')+'</p></div></div>'}
function bag(){let p=state.player;return '<div class="hero"><h2>Сумка</h2><p>Предметы, деньги, заметки. Действия игрока пишутся в журнал.</p></div><div class="grid two"><div class="card"><h3>Предметы</h3><div class="stack">'+(p.items||[]).map((it,i)=>'<div class="box green"><b>'+esc(it)+'</b><button class="btn" style="margin-top:8px" onclick="remItem('+i+')">убрать</button></div>').join('')+'</div><div class="field" style="margin-top:12px"><label>Добавить</label><input id="newItem" placeholder="Ключ"></div><button class="btn main full" onclick="addItem()">Добавить</button></div><div class="card"><h3>Деньги и заметки</h3><div class="stats"><div class="stat"><span>зм</span><b>'+(p.coins?.gp||0)+'</b></div><div class="stat"><span>см</span><b>'+(p.coins?.sp||0)+'</b></div><div class="stat"><span>мм</span><b>'+(p.coins?.cp||0)+'</b></div></div><div class="grid three" style="margin-top:12px"><input id="selfGp" type="number" placeholder="зм"><input id="selfSp" type="number" placeholder="см"><input id="selfCp" type="number" placeholder="мм"></div><button class="btn full" style="margin-top:8px" onclick="changeCoins()">Изменить деньги</button><div class="field" style="margin-top:12px"><label>Заметки</label><textarea oninput="updateMe({notes:this.value})">'+esc(p.notes||'')+'</textarea></div></div></div>'}
function events(){let filter=state.filter||'all',players=Object.values(roomData.players||{});let form=state.mode==='master'?'<div class="card" style="margin-top:14px"><h3>Создать сообщение</h3><div class="grid four"><div class="field"><label>Тип</label><select id="evKind">'+Object.entries(EVENTS).filter(([k])=>k!=='all').map(([k,v])=>'<option value="'+k+'">'+v[0]+'</option>').join('')+'</select></div><div class="field"><label>Кому</label><select id="evTarget"><option value="all">Всем</option><option value="master">Только мастеру</option>'+players.map(p=>'<option value="'+p.id+'">'+esc(p.name)+'</option>').join('')+'</select></div><div class="field"><label>Заголовок</label><input id="evTitle" placeholder="Ловушка"></div><div class="field"><label>Текст</label><input id="evText" placeholder="описание"></div></div><button class="btn main full" onclick="manualEvent()">Показать сообщение</button></div>':'';return '<div class="hero"><h2>Журнал уведомлений</h2><p>Отдельно от боя и мира. Есть фильтры.</p></div><div class="card"><div class="btnrow">'+Object.entries(EVENTS).map(([k,v])=>'<button class="btn '+(filter===k?'main':'')+'" onclick="setFilter(\''+k+'\')">'+v[0]+'</button>').join('')+'</div></div>'+form+'<div class="grid two" style="margin-top:14px">'+eventList(filter,state.mode==='master')+'</div>'}
function eventList(filter,canRemove){let list=Object.entries(roomData.events||{}).sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));if(filter&&filter!=='all')list=list.filter(([id,e])=>e.kind===filter);if(!list.length)return '<div class="empty">Журнал пока пуст.</div>';return list.slice(0,100).map(([id,e])=>'<div class="box '+(EVENTS[e.kind]?.[1]||'blue')+'"><b>'+esc(e.title)+'</b><p>'+esc(e.text)+'</p><p class="small">'+now(e.createdAt)+' · '+esc(EVENTS[e.kind]?.[0]||e.kind)+' · кому: '+esc(e.target||'all')+'</p>'+(canRemove?'<button class="btn" style="margin-top:8px" onclick="remEvent(\''+id+'\')">убрать</button>':'')+'</div>').join('')}
function reset(){return '<div class="hero"><h2>Сброс</h2><p>Очистка боя, событий или всей комнаты.</p></div><div class="grid two"><div class="card"><h3>Очистить бой</h3><button class="btn yellow full" onclick="clearCombat()">Очистить бой</button></div><div class="card"><h3>Очистить журнал</h3><button class="btn yellow full" onclick="clearEvents()">Очистить журнал</button></div><div class="card"><h3>Сбросить комнату</h3><button class="btn red full" onclick="resetRoom()">Сбросить комнату</button></div><div class="card"><h3>Сбросить устройство</h3><button class="btn red full" onclick="resetLocal()">Сбросить устройство</button></div></div>'}
function sheet(){let p=state.player,c=cls(p);return '<div class="hero no-print"><h2>Лист A4</h2><p>Можно печатать или сохранить PDF.</p><button class="btn main" style="margin-top:12px" onclick="window.print()">Печать / PDF</button></div><div class="sheet"><div class="sheetgrid"><div class="sblock"><h4>Имя</h4><h2>'+esc(p.name)+'</h2></div><div class="sblock"><h4>Класс и уровень</h4><p>'+c.name+' · '+p.level+'</p></div><div class="sblock"><h4>Раса / предыстория</h4><p>'+race(p).name+' · '+bg(p).name+'</p></div></div><div class="sabilities" style="margin-top:8px">'+Object.entries(AB).map(([k,v])=>'<div class="sability"><h4>'+v[0]+'</h4><div class="smod">'+fmt(statmod(p,k))+'</div><div class="sscore">'+total(p,k)+'</div></div>').join('')+'</div><div class="sheetgrid" style="margin-top:8px"><div class="sblock"><h4>КД</h4><p class="sbig">'+p.ac+'</p></div><div class="sblock"><h4>Инициатива</h4><p class="sbig">'+fmt(p.initiative)+'</p></div><div class="sblock"><h4>Скорость</h4><p class="sbig">'+race(p).speed+'</p></div><div class="sblock"><h4>Хиты</h4><p>Макс: '+p.maxHp+'</p><p>Текущие: '+p.hp+'</p><p>Временные: '+(p.tempHp||0)+'</p></div><div class="sblock"><h4>Смерть</h4><p>Успехи: '+(p.death?.ok||0)+'</p><p>Провалы: '+(p.death?.fail||0)+'</p></div><div class="sblock"><h4>Атака</h4><p>'+esc(atkText(p))+'</p><p>'+esc(dmgText(p))+'</p></div></div><div class="sheetgrid" style="margin-top:8px"><div class="sblock"><h4>Спасброски</h4><p>'+Object.entries(AB).map(([k,v])=>v[1]+' '+fmt(saveBonus(p,k))).join(' · ')+'</p></div><div class="sblock"><h4>Навыки</h4><p>'+Object.entries(SK).map(([k,s])=>s[0]+' '+fmt(skillBonus(p,k))).join(' · ')+'</p></div><div class="sblock"><h4>Снаряжение и деньги</h4><p>'+(p.items||[]).map(esc).join(', ')+'</p><p>'+(p.coins?.gp||0)+' зм · '+(p.coins?.sp||0)+' см · '+(p.coins?.cp||0)+' мм</p></div></div><div class="sblock" style="margin-top:8px"><h4>Особенности</h4><p>'+esc(c.combat.join(' ')+' '+c.passive.join(' ')+' '+race(p).features.join(', '))+'</p></div></div>'}
try{if(state.mode&&state.roomId)listen();render()}catch(e){console.error(e);app.innerHTML='<div class="hero"><h2>Ошибка в HTML</h2><p>'+esc(e.message)+'</p></div><button class="btn main" onclick="localStorage.removeItem(\''+LS+'\');location.reload()">Сбросить и открыть</button>'}
})();
</script>
</body>
</html>
